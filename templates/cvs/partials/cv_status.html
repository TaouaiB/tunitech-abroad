<div class="mt-4 p-4 bg-gray-50 rounded border">
    <h3 class="font-medium text-gray-700 mb-2">Parsing Status</h3>
    <p class="mb-2">
        <span class="inline-block px-2 py-1 rounded text-sm font-semibold
            {% if cv.parse_status == 'pending' or cv.parse_status == 'processing' %}bg-yellow-100 text-yellow-800
            {% elif cv.parse_status == 'parsed' or cv.parse_status == 'parsed_with_warnings' %}bg-green-100 text-green-800
            {% else %}bg-red-100 text-red-800{% endif %}">
            {{ cv.get_parse_status_display }}
        </span>
    </p>
    
    {% if cv.parse_error %}
        <p class="text-red-600 text-sm mb-2">{{ cv.parse_error }}</p>
    {% endif %}

    {% if cv.parsed_data %}
        {% include 'cvs/partials/cv_parsed_summary.html' with parsed_data=cv.parsed_data %}
    {% endif %}
</div>
