<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuniTech Abroad</title>
    <!-- Simple tailwind play CDN for Phase 1 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <a href="/" class="text-xl font-bold text-blue-600">TuniTech Abroad</a>
            <nav class="space-x-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard:home' %}" class="text-gray-600 hover:text-gray-900">Dashboard</a>
                    <form method="post" action="{% url 'account_logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-red-600 hover:text-red-800">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'account_login' %}" class="text-gray-600 hover:text-gray-900">Login</a>
                    <a href="{% url 'account_signup' %}" class="text-blue-600 font-semibold hover:text-blue-800">Signup</a>
                {% endif %}
            </nav>
        </div>
    </header>
    
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% if messages %}
            <div class="mb-8">
                {% for message in messages %}
                    <div class="p-4 rounded-md mb-4 {% if message.tags == 'error' %}bg-red-50 text-red-800{% else %}bg-green-50 text-green-800{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>
</body>
</html>
