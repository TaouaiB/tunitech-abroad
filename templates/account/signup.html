{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold mb-6">Sign Up</h1>
    <form method="post" action="{% url 'account_signup' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md mt-4 hover:bg-blue-700">Sign Up</button>
    </form>
    <div class="mt-4 text-center">
        <a href="{% url 'account_login' %}" class="text-blue-600 hover:underline">Already have an account? Login</a>
    </div>
</div>
{% endblock %}
