{% extends "base.html" %}

{% block title %}Mot de passe modifié - TuniAtlas{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-gray-50">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-10 px-4 shadow-xl sm:rounded-2xl sm:px-10 border border-gray-100 text-center relative overflow-hidden">
            <!-- Decorative background -->
            <div class="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-brand-50 rounded-full opacity-50"></div>
            <div class="absolute bottom-0 left-0 -mb-4 -ml-4 w-20 h-20 bg-brand-50 rounded-full opacity-50"></div>
            
            <div class="relative">
                <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                    <svg class="h-8 w-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                
                <h2 class="text-2xl font-extrabold text-gray-900 mb-4">Mot de passe modifié</h2>
                <p class="text-gray-600 mb-8 leading-relaxed">
                    Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
                </p>
                <a href="{% url 'account_login' %}" class="w-full btn-primary py-3 text-base">
                    Me connecter
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
