{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6 text-center">
    <h1 class="text-2xl font-bold mb-6">Sign Out</h1>
    <p class="mb-6">Are you sure you want to sign out?</p>
    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700">Sign Out</button>
    </form>
</div>
{% endblock %}
