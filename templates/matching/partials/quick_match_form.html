<form action="{% url 'matching:quick_match' public_id=job.public_id %}" method="post" class="space-y-4" hx-post="{% url 'matching:quick_match' public_id=job.public_id %}" hx-target="#quick-match-container" hx-swap="innerHTML">
    {% csrf_token %}
    <div>
        <label for="id_skills" class="block text-sm font-medium text-gray-700">Skills (comma separated)</label>
        <textarea name="skills" id="id_skills" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" required placeholder="Python, Django, React, etc."></textarea>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label for="id_experience_level" class="block text-sm font-medium text-gray-700">Experience Level</label>
            <select name="experience_level" id="id_experience_level" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" required>
                <option value="">---</option>
                <option value="intern">Internship / Student</option>
                <option value="junior">Junior (0-2 years)</option>
                <option value="mid">Mid-Level (2-5 years)</option>
                <option value="senior">Senior (5+ years)</option>
            </select>
        </div>
        <div>
            <label for="id_french_level" class="block text-sm font-medium text-gray-700">French Level</label>
            <select name="french_level" id="id_french_level" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                <option value="">---</option>
                <option value="none">None</option>
                <option value="basic">Basic (A1/A2)</option>
                <option value="intermediate">Intermediate (B1/B2)</option>
                <option value="advanced">Advanced (C1)</option>
                <option value="fluent">Fluent / Native (C2)</option>
            </select>
        </div>
    </div>

    <div>
        <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Run Quick Match
        </button>
    </div>
</form>
