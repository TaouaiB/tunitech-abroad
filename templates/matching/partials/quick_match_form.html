<form action="{% url 'matching:quick_match' public_id=job.public_id %}" method="post" class="space-y-4" hx-post="{% url 'matching:quick_match' public_id=job.public_id %}" hx-target="#quick-match-result" hx-swap="innerHTML">
    {% csrf_token %}
    <div class="tta-field">
        <label for="id_skills" class="tta-label">Vos compétences <span style="color:var(--red-600)">*</span></label>
        <textarea name="skills" id="id_skills" rows="3" class="tta-input" required placeholder="ex: Python, Django, React, Docker, AWS"></textarea>
    </div>

    <div class="tta-field">
        <label class="tta-label">Votre expérience <span style="color:var(--red-600)">*</span></label>
        <select name="experience_level" class="tta-select" required>
            <option value="intern">Stage / Étudiant</option>
            <option value="junior">Junior (0-2 ans)</option>
            <option value="mid">Confirmé (2-5 ans)</option>
            <option value="senior">Senior (5+ ans)</option>
        </select>
    </div>

    <div class="tta-field">
        <label class="tta-label">Niveau de Français</label>
        <select name="french_level" class="tta-select">
            <option value="none">Aucun</option>
            <option value="basic">Débutant (A1/A2)</option>
            <option value="intermediate">Intermédiaire (B1/B2)</option>
            <option value="advanced">Avancé (C1)</option>
            <option value="fluent">Courant (C2)</option>
        </select>
    </div>

    <div style="margin-top:18px">
        <button type="submit" id="qm-btn" class="tta-btn tta-btn-primary" style="width:100%">
            <span class="btn-text">Lancer le test rapide</span>
            <span class="btn-loading hidden ml-2 flex items-center gap-2">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" style="display:inline-block;">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Analyse en cours...
            </span>
        </button>
    </div>
</form>

<div id="quick-match-result" class="mt-4"></div>

<script>
    // Reset loading state on pageshow (e.g., when returning via Back button/BFCache)
    window.addEventListener('pageshow', function(event) {
        var btn = document.getElementById('qm-btn');
        if (btn) {
            btn.disabled = false;
            var textSpan = btn.querySelector('.btn-text');
            var loadingSpan = btn.querySelector('.btn-loading');
            if (textSpan) textSpan.classList.remove('hidden');
            if (loadingSpan) loadingSpan.classList.add('hidden');
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
        }
    });

    document.body.addEventListener('htmx:beforeRequest', function(evt) {
        if (evt.target.id === 'qm-btn' || evt.detail.elt.querySelector('#qm-btn')) {
            var btn = document.getElementById('qm-btn');
            if (btn) {
                btn.disabled = true;
                btn.classList.add('opacity-75', 'cursor-not-allowed');
                var textSpan = btn.querySelector('.btn-text');
                var loadingSpan = btn.querySelector('.btn-loading');
                if (textSpan) textSpan.classList.add('hidden');
                if (loadingSpan) loadingSpan.classList.remove('hidden');
            }
        }
    });

    document.body.addEventListener('htmx:afterRequest', function(evt) {
        if (evt.target.id === 'qm-btn' || evt.detail.elt.querySelector('#qm-btn')) {
            var btn = document.getElementById('qm-btn');
            if (btn) {
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                var textSpan = btn.querySelector('.btn-text');
                var loadingSpan = btn.querySelector('.btn-loading');
                if (textSpan) textSpan.classList.remove('hidden');
                if (loadingSpan) loadingSpan.classList.add('hidden');
            }
        }
    });

    // Clear result when input changes
    var form = document.querySelector('#quick-match-container form');
    if (form) {
        form.addEventListener('input', function() {
            var resultContainer = document.getElementById('quick-match-result');
            if (resultContainer) {
                resultContainer.innerHTML = '';
            }
        });
    }
</script>
