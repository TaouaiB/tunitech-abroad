<form method="get" action="{% url 'jobs:list' %}" class="space-y-4">
    <!-- Search Query -->
    <div class="tta-field">
        <label for="q" class="tta-label">Mots-clés</label>
        <input type="text" name="q" id="q" value="{{ filters.q|default:'' }}" class="tta-input" placeholder="ex: Python, Django, React">
    </div>

    <!-- Location -->
    <div class="tta-field">
        <label for="location" class="tta-label">Lieu (France)</label>
        <input type="text" name="location" id="location" value="{{ filters.location|default:'' }}" class="tta-input" placeholder="ex: Paris, Lyon">
    </div>

    <!-- Contract Type -->
    <div class="tta-field">
        <label for="contract_type" class="tta-label">Type de contrat</label>
        <input type="text" name="contract_type" id="contract_type" value="{{ filters.contract_type|default:'' }}" class="tta-input" placeholder="ex: CDI, CDD">
    </div>

    <!-- Remote Type -->
    <div class="tta-field">
        <label for="remote_type" class="tta-label">Télétravail</label>
        <select id="remote_type" name="remote_type" class="tta-select">
            <option value="" {% if not filters.remote_type %}selected{% endif %}>Tous</option>
            <option value="remote" {% if filters.remote_type == "remote" %}selected{% endif %}>100% Télétravail</option>
            <option value="hybrid" {% if filters.remote_type == "hybrid" %}selected{% endif %}>Hybride</option>
            <option value="on_site" {% if filters.remote_type == "on_site" %}selected{% endif %}>Sur site</option>
        </select>
    </div>

    <!-- Job Type -->
    <div class="tta-field">
        <label for="job_type" class="tta-label">Type d'emploi</label>
        <select id="job_type" name="job_type" class="tta-select">
            <option value="" {% if not filters.job_type %}selected{% endif %}>Tous</option>
            <option value="full_time_job" {% if filters.job_type == "full_time_job" %}selected{% endif %}>Temps plein</option>
            <option value="internship" {% if filters.job_type == "internship" %}selected{% endif %}>Stage (PFE)</option>
            <option value="apprenticeship" {% if filters.job_type == "apprenticeship" %}selected{% endif %}>Alternance</option>
            <option value="contract" {% if filters.job_type == "contract" %}selected{% endif %}>Freelance / Contrat</option>
        </select>
    </div>

    <!-- Experience Level -->
    <div class="tta-field">
        <label for="experience_level" class="tta-label">Niveau d'expérience</label>
        <select id="experience_level" name="experience_level" class="tta-select">
            <option value="" {% if not filters.experience_level %}selected{% endif %}>Tous</option>
            <option value="internship" {% if filters.experience_level == "internship" %}selected{% endif %}>Stage</option>
            <option value="junior" {% if filters.experience_level == "junior" %}selected{% endif %}>Junior (0-2 ans)</option>
            <option value="mid_level" {% if filters.experience_level == "mid_level" %}selected{% endif %}>Confirmé (2-5 ans)</option>
            <option value="senior" {% if filters.experience_level == "senior" %}selected{% endif %}>Senior (5+ ans)</option>
        </select>
    </div>

    <!-- Skill -->
    <div class="tta-field">
        <label for="skill" class="tta-label">Compétence</label>
        <input type="text" name="skill" id="skill" value="{{ filters.skill|default:'' }}" class="tta-input" placeholder="ex: Docker, SQL">
    </div>

    <!-- Sort -->
    <div class="tta-field">
        <label for="sort" class="tta-label">Trier par</label>
        <select id="sort" name="sort" class="tta-select">
            <option value="relevance" {% if sort == "relevance" %}selected{% endif %}>Plus pertinentes</option>
            <option value="newest" {% if sort == "newest" %}selected{% endif %}>Plus récentes</option>
            <option value="company" {% if sort == "company" %}selected{% endif %}>Entreprise</option>
        </select>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;margin-top:18px">
        <button type="submit" class="tta-btn tta-btn-primary" style="width:100%">Appliquer les filtres</button>
        <a href="{% url 'jobs:list' %}" class="tta-btn tta-btn-secondary" style="width:100%;text-align:center;">Réinitialiser</a>
    </div>
</form>
