<div class="bg-white p-6 rounded-lg shadow">
    <h2 class="text-lg font-medium text-gray-900 mb-4">Filters</h2>
    
    <form method="get" action="{% url 'jobs:list' %}" class="space-y-6">
        <!-- Search Query -->
        <div>
            <label for="q" class="block text-sm font-medium text-gray-700">Keyword</label>
            <div class="mt-1">
                <input type="text" name="q" id="q" value="{{ filters.q|default:'' }}" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md" placeholder="e.g. Python, Django">
            </div>
        </div>

        <!-- Location -->
        <div>
            <label for="location" class="block text-sm font-medium text-gray-700">Location</label>
            <div class="mt-1">
                <input type="text" name="location" id="location" value="{{ filters.location|default:'' }}" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md" placeholder="e.g. Paris">
            </div>
        </div>
        
        <!-- Skill -->
        <div>
            <label for="skill" class="block text-sm font-medium text-gray-700">Specific Skill</label>
            <div class="mt-1">
                <input type="text" name="skill" id="skill" value="{{ filters.skill|default:'' }}" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md" placeholder="e.g. Docker">
            </div>
        </div>

        <!-- Contract Type -->
        <div>
            <label for="contract_type" class="block text-sm font-medium text-gray-700">Contract</label>
            <input type="text" name="contract_type" id="contract_type" value="{{ filters.contract_type|default:'' }}" class="mt-1 shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md" placeholder="e.g. CDI, CDD">
        </div>

        <!-- Remote Type -->
        <div>
            <label for="remote_type" class="block text-sm font-medium text-gray-700">Remote</label>
            <select id="remote_type" name="remote_type" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                <option value="" {% if not filters.remote_type %}selected{% endif %}>Any</option>
                <option value="remote" {% if filters.remote_type == "remote" %}selected{% endif %}>Remote</option>
                <option value="hybrid" {% if filters.remote_type == "hybrid" %}selected{% endif %}>Hybrid</option>
                <option value="on_site" {% if filters.remote_type == "on_site" %}selected{% endif %}>On-site</option>
            </select>
        </div>

        <!-- Job Type -->
        <div>
            <label for="job_type" class="block text-sm font-medium text-gray-700">Job Type</label>
            <select id="job_type" name="job_type" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                <option value="" {% if not filters.job_type %}selected{% endif %}>Any</option>
                <option value="full_time_job" {% if filters.job_type == "full_time_job" %}selected{% endif %}>Full-time</option>
                <option value="internship" {% if filters.job_type == "internship" %}selected{% endif %}>Internship</option>
                <option value="apprenticeship" {% if filters.job_type == "apprenticeship" %}selected{% endif %}>Apprenticeship</option>
                <option value="contract" {% if filters.job_type == "contract" %}selected{% endif %}>Contract</option>
            </select>
        </div>

        <!-- Experience Level -->
        <div>
            <label for="experience_level" class="block text-sm font-medium text-gray-700">Experience</label>
            <select id="experience_level" name="experience_level" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                <option value="" {% if not filters.experience_level %}selected{% endif %}>Any</option>
                <option value="internship" {% if filters.experience_level == "internship" %}selected{% endif %}>Internship</option>
                <option value="junior" {% if filters.experience_level == "junior" %}selected{% endif %}>Junior</option>
                <option value="mid_level" {% if filters.experience_level == "mid_level" %}selected{% endif %}>Mid-level</option>
                <option value="senior" {% if filters.experience_level == "senior" %}selected{% endif %}>Senior</option>
            </select>
        </div>

        <!-- Sort -->
        <div>
            <label for="sort" class="block text-sm font-medium text-gray-700">Sort by</label>
            <select id="sort" name="sort" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                <option value="relevance" {% if sort == "relevance" %}selected{% endif %}>Relevance</option>
                <option value="newest" {% if sort == "newest" %}selected{% endif %}>Newest</option>
                <option value="company" {% if sort == "company" %}selected{% endif %}>Company</option>
            </select>
        </div>

        <div class="pt-4 flex flex-col gap-3">
            <button type="submit" class="w-full bg-blue-600 border border-transparent rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Apply Filters
            </button>
            <a href="{% url 'jobs:list' %}" class="w-full bg-white border border-gray-300 rounded-md shadow-sm py-2 px-4 inline-flex justify-center text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Clear
            </a>
        </div>
    </form>
</div>
