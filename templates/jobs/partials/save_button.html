<div id="save-button-{{ job.public_id }}">
    {% if is_saved %}
        <form method="POST" action="{% url 'jobs:unsave' job.public_id %}" {% if request.htmx %}hx-post="{% url 'jobs:unsave' job.public_id %}" hx-target="#save-button-{{ job.public_id }}" hx-swap="outerHTML"{% endif %}>
            {% csrf_token %}
            <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-blue-700 bg-blue-100 hover:bg-blue-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                <svg class="-ml-1 mr-2 h-5 w-5 text-blue-700" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg>
                Saved
            </button>
        </form>
    {% else %}
        <form method="POST" action="{% url 'jobs:save' job.public_id %}" {% if request.htmx %}hx-post="{% url 'jobs:save' job.public_id %}" hx-target="#save-button-{{ job.public_id }}" hx-swap="outerHTML"{% endif %}>
            {% csrf_token %}
            <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                <svg class="-ml-1 mr-2 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                Save Job
            </button>
        </form>
    {% endif %}
</div>
