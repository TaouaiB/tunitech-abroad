<div id="save-button-{{ job.public_id }}">
    {% if is_saved %}
        <form method="POST" action="{% url 'jobs:unsave' job.public_id %}" {% if request.htmx %}hx-post="{% url 'jobs:unsave' job.public_id %}" hx-target="#save-button-{{ job.public_id }}" hx-swap="outerHTML"{% endif %}>
            {% csrf_token %}
            <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2 border border-brand-200 text-sm font-bold rounded-md shadow-sm text-brand-700 bg-brand-50 hover:bg-brand-100 transition-colors">
                <svg class="-ml-1 mr-2 h-5 w-5 text-brand-600" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg>
                Sauvegardée
            </button>
        </form>
    {% else %}
        <form method="POST" action="{% url 'jobs:save' job.public_id %}" {% if request.htmx %}hx-post="{% url 'jobs:save' job.public_id %}" hx-target="#save-button-{{ job.public_id }}" hx-swap="outerHTML"{% endif %}>
            {% csrf_token %}
            <button type="submit" class="w-full sm:w-auto inline-flex items-center justify-center px-4 py-2 border border-gray-300 text-sm font-bold rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                <svg class="-ml-1 mr-2 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                Sauvegarder
            </button>
        </form>
    {% endif %}
</div>
