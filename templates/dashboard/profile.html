{% extends 'base.html' %}

{% block title %}My Profile{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
    <h1 class="text-3xl font-bold mb-6">Candidate Profile</h1>
    
    {% if messages %}
    <div class="mb-4">
        {% for message in messages %}
        <div class="p-4 mb-2 bg-green-100 text-green-800 rounded">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="bg-white p-6 rounded shadow-sm">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save Profile</button>
        </form>
    </div>
</div>
{% endblock %}
