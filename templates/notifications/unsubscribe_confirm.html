{% extends 'base.html' %}

{% block title %}Confirm Unsubscribe{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-16 max-w-2xl text-center">
    <div class="bg-white p-8 rounded shadow-sm border border-gray-100">
        <h1 class="text-3xl font-bold mb-4 text-gray-800">Confirm Unsubscribe</h1>
        <p class="text-gray-600 mb-6">
            Confirm that you want to stop receiving these emails.
        </p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="inline-block px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
                Unsubscribe
            </button>
        </form>
    </div>
</div>
{% endblock %}
